<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="OP ROI" />
  <meta name="theme-color" content="#08111f" />
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="180x180" href="./assets/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="./assets/icon-512.png" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <title>One Piece PSA 10 ROI Board</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #08111f;
      --bg-2: #11152c;
      --panel: rgba(17, 24, 43, 0.88);
      --panel-2: rgba(26, 35, 61, 0.92);
      --panel-soft: rgba(255,255,255,0.05);
      --text: #ebf2ff;
      --muted: #a9b5d6;
      --accent: #8a7dff;
      --accent-2: #58a6ff;
      --good: #3ddc97;
      --warn: #ffcc66;
      --border: rgba(255,255,255,0.08);
      --shadow: 0 18px 40px rgba(0,0,0,.28);
    }
    * { box-sizing: border-box; }
    html {
      scroll-behavior: smooth;
    }
    body {
      margin: 0;
      font-family: Inter, Segoe UI, Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(138,125,255,.22), transparent 28%),
        linear-gradient(180deg, #0d1020 0%, #101731 38%, #0a1325 100%);
      color: var(--text);
      min-height: 100vh;
    }
    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      padding-bottom: max(20px, env(safe-area-inset-bottom));
    }
    .hero, .panel, .card, .ticker-shell, .toolbar {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px;
      backdrop-filter: blur(14px);
      box-shadow: var(--shadow);
    }
    .hero {
      padding: 24px;
      margin-bottom: 20px;
      background:
        radial-gradient(circle at top right, rgba(138,125,255,.24), transparent 34%),
        radial-gradient(circle at bottom left, rgba(88,166,255,.12), transparent 28%),
        var(--panel);
    }
    .hero-head {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .app-logo {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      object-fit: cover;
      border: 1px solid rgba(255,255,255,.14);
      box-shadow: 0 0 22px rgba(0,0,0,.28);
      flex: 0 0 auto;
    }
    h1 { margin: 0 0 8px; font-size: 32px; line-height: 1.02; letter-spacing: -.03em; }
    p { margin: 0; color: var(--muted); }
    .stats-wrap {
      margin-top: 18px;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
    }
    .panel {
      padding: 16px;
      background: var(--panel-soft);
    }
    .stat-label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .08em; }
    .stat-value { font-size: 26px; font-weight: 700; margin-top: 6px; }
    .hero-copy {
      flex: 1 1 320px;
      min-width: 0;
    }
    .ticker-shell {
      margin-bottom: 18px;
      padding: 10px 0;
      overflow: hidden;
      position: relative;
    }
    .ticker-shell::before,
    .ticker-shell::after {
      content: '';
      position: absolute;
      top: 0;
      bottom: 0;
      width: 64px;
      z-index: 2;
      pointer-events: none;
    }
    .ticker-shell::before {
      left: 0;
      background: linear-gradient(90deg, rgba(8,17,31,1), rgba(8,17,31,0));
    }
    .ticker-shell::after {
      right: 0;
      background: linear-gradient(270deg, rgba(8,17,31,1), rgba(8,17,31,0));
    }
    .ticker-track {
      display: flex;
      width: max-content;
      gap: 24px;
      will-change: transform;
      transform: translate3d(0, 0, 0);
    }
    .ticker-group {
      display: flex;
      gap: 12px;
      flex: 0 0 auto;
    }
    .ticker-item {
      width: 72px;
      height: 96px;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.04);
      flex: 0 0 auto;
      box-shadow: 0 0 16px rgba(0,0,0,.18);
    }
    .ticker-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .toolbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin: 20px 0 14px;
      flex-wrap: wrap;
      padding: 14px;
      position: sticky;
      top: 12px;
      z-index: 5;
      background: rgba(13, 18, 36, 0.82);
    }
    .search {
      width: min(420px, 100%);
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      font-size: 15px;
      outline: none;
    }
    .search:focus {
      border-color: rgba(138,125,255,.55);
      box-shadow: 0 0 0 4px rgba(138,125,255,.16);
    }
    .meta { color: var(--muted); font-size: 14px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
      gap: 16px;
    }
    .card {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.025)),
        var(--panel);
    }
    .media {
      width: 100%;
      aspect-ratio: 1 / 1.35;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      display: grid;
      place-items: center;
      position: relative;
      isolation: isolate;
    }
    .media::before {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 16px;
      padding: 3px;
      background: transparent;
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      mask-composite: exclude;
      opacity: 0;
      pointer-events: none;
      z-index: 2;
    }
    .media.candidate-ring-silver::before,
    .media.candidate-ring-gold::before {
      opacity: 1;
      animation: ringFlow 3.2s linear infinite;
      box-shadow: 0 0 16px rgba(255,255,255,.15);
    }
    .media.candidate-ring-silver::before {
      background: conic-gradient(from 0deg, rgba(255,255,255,.2), #f7f7f7, #9ea7b3, #ffffff, rgba(255,255,255,.2));
      box-shadow: 0 0 18px rgba(214,224,237,.35);
    }
    .media.candidate-ring-gold::before {
      background: conic-gradient(from 0deg, rgba(255,210,84,.25), #ffd54f, #ffef9a, #ffb300, #fff2b3, rgba(255,210,84,.25));
      box-shadow: 0 0 20px rgba(255,209,102,.45);
    }
    .media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .media-fallback {
      color: var(--muted);
      font-size: 13px;
      text-align: center;
      padding: 16px;
    }
    .topline {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }
    .card-head {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      min-width: 0;
    }
    .rank {
      min-width: 44px;
      height: 44px;
      border-radius: 12px;
      background: rgba(88,166,255,.15);
      color: var(--accent);
      display: grid;
      place-items: center;
      font-weight: 800;
    }
    .title {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.25;
    }
    .subtitle {
      color: var(--muted);
      font-size: 13px;
      margin-top: 4px;
    }
    .roi {
      color: var(--good);
      font-weight: 800;
      font-size: 24px;
      white-space: nowrap;
    }
    .metrics {
      display: grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 10px;
    }
    .metric {
      background: rgba(255,255,255,.03);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
    }
    .metric .label { color: var(--muted); font-size: 12px; }
    .metric .value { margin-top: 5px; font-weight: 700; }
    .links { display: flex; gap: 10px; flex-wrap: wrap; }
    .candidate-list {
      display: grid;
      gap: 10px;
    }
    .candidate {
      border: 1px solid var(--border);
      background: rgba(255,255,255,.03);
      border-radius: 12px;
      padding: 12px;
    }
    .candidate-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      margin-bottom: 8px;
    }
    .candidate-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
    }
    .candidate-meta {
      display: grid;
      grid-template-columns: repeat(3, minmax(0,1fr));
      gap: 8px;
      margin-top: 8px;
    }
    .candidate-meta .metric {
      padding: 8px 10px;
    }
    .candidate-note {
      color: var(--muted);
      font-size: 12px;
      margin-top: 8px;
      line-height: 1.35;
    }
    a.button {
      text-decoration: none;
      color: var(--text);
      background: linear-gradient(135deg, #111111, #262626);
      padding: 12px 14px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 14px;
      text-align: center;
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    a.button.secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .empty {
      padding: 32px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--border);
      border-radius: 16px;
    }
    @media (max-width: 720px) {
      .wrap {
        padding: 12px;
      }
      .ticker-shell {
        border-radius: 20px;
        padding: 8px 0;
      }
      .ticker-item {
        width: 60px;
        height: 82px;
      }
      .hero {
        padding: 18px;
        border-radius: 28px;
      }
      .hero-head {
        align-items: flex-start;
        gap: 14px;
      }
      .hero-copy {
        flex-basis: 100%;
      }
      .app-logo {
        width: 58px;
        height: 58px;
        border-radius: 16px;
      }
      h1 {
        font-size: 28px;
        margin-bottom: 6px;
      }
      .stats-wrap {
        overflow-x: auto;
        margin: 18px -4px 0;
        padding: 0 4px 2px;
        scrollbar-width: none;
      }
      .stats-wrap::-webkit-scrollbar {
        display: none;
      }
      .stats {
        display: flex;
        gap: 10px;
        width: max-content;
        min-width: 100%;
      }
      .stats .panel {
        min-width: 148px;
        scroll-snap-align: start;
      }
      .toolbar {
        top: 8px;
        padding: 12px;
        border-radius: 20px;
      }
      .search {
        width: 100%;
      }
      .meta {
        width: 100%;
        font-size: 13px;
        line-height: 1.4;
      }
      .grid {
        grid-template-columns: 1fr;
        gap: 12px;
      }
      .card {
        padding: 14px;
        border-radius: 26px;
      }
      .topline {
        flex-direction: column;
        align-items: stretch;
      }
      .card-head {
        width: 100%;
      }
      .roi {
        font-size: 22px;
      }
      .metrics {
        gap: 8px;
      }
      .metric {
        border-radius: 14px;
      }
      .candidate-head {
        flex-direction: column;
        align-items: stretch;
      }
      .candidate-meta {
        grid-template-columns: 1fr;
      }
      .links, .links .button, .candidate-head .button {
        width: 100%;
      }
    }
    @keyframes ringFlow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="ticker-shell">
      <div id="tickerTrack" class="ticker-track"></div>
    </section>

    <section class="hero">
      <div class="hero-head">
        <img class="app-logo" src="./assets/logo.jpg" alt="App logo" />
        <div class="hero-copy">
          <h1>One Piece PSA 10 ROI Board</h1>
          <p>Weekly Collectr-first raw to PSA 10 scan. This board shows cards clearing the 80% ROI threshold after grading cost and liquidity haircut.</p>
        </div>
      </div>
      <div class="stats-wrap">
        <div class="stats">
        <div class="panel"><div class="stat-label">Qualified cards</div><div id="qualifiedCount" class="stat-value">-</div></div>
        <div class="panel"><div class="stat-label">Best ROI</div><div id="bestRoi" class="stat-value">-</div></div>
        <div class="panel"><div class="stat-label">Generated</div><div id="generatedAt" class="stat-value" style="font-size:18px">-</div></div>
        <div class="panel"><div class="stat-label">Rules</div><div class="stat-value" style="font-size:18px">80%+ ROI</div></div>
        </div>
      </div>
    </section>

    <div class="toolbar">
      <input id="search" class="search" placeholder="Filter by card code, name, or set" />
      <div id="meta" class="meta">Loading latest scan...</div>
    </div>

    <div id="results" class="grid"></div>
  </div>

  <script>
    const fmtMoney = (n) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(Number(n || 0));
    const fmtPct = (n) => `${Number(n || 0).toFixed(2)}%`;
    const fmtDate = (value) => {
      if (!value) return '-';
      const d = new Date(value);
      return Number.isNaN(d.getTime()) ? value : d.toLocaleString();
    };

    let allRows = [];
    let tickerFrame = null;

    function productImageUrl(productId, ext = 'jpg') {
      return `https://public.getcollectr.com/public-assets/products/product_${productId}.${ext}?optimizer=image&format=webp&width=1200&quality=80&strip=metadata`;
    }

    function buildTickerRows(rows) {
      const items = rows.slice(0, Math.min(rows.length, 24));
      if (!items.length) return '';
      const groupHtml = items.map((row) => `
        <a class="ticker-item" href="${row.collectrLink}" target="_blank" rel="noopener noreferrer" title="${row.code} ${row.name}">
          <img
            src="${productImageUrl(row.productId, 'jpg')}"
            data-fallback-src="${productImageUrl(row.productId, 'png')}"
            alt="${row.code} ${row.name}"
            loading="eager"
            onerror="if(!this.dataset.failedOnce){this.dataset.failedOnce='1';this.src=this.dataset.fallbackSrc;}"
          />
        </a>
      `).join('');
      return `<div class="ticker-group">${groupHtml}</div><div class="ticker-group" aria-hidden="true">${groupHtml}</div>`;
    }

    function initTicker() {
      const shell = document.querySelector('.ticker-shell');
      const track = document.getElementById('tickerTrack');
      if (!shell || !track) return;

      if (tickerFrame) cancelAnimationFrame(tickerFrame);

      const groups = track.querySelectorAll('.ticker-group');
      if (groups.length < 2) return;

      const groupWidth = groups[0].offsetWidth + 12;
      if (!groupWidth) return;

      let offset = 0;
      let paused = false;
      let lastTs = 0;
      const speed = 28;

      shell.onmouseenter = () => { paused = true; };
      shell.onmouseleave = () => { paused = false; };

      const step = (ts) => {
        if (!lastTs) lastTs = ts;
        const dt = (ts - lastTs) / 1000;
        lastTs = ts;
        if (!paused) {
          offset += speed * dt;
          if (offset >= groupWidth) offset -= groupWidth;
          track.style.transform = `translate3d(${-offset}px, 0, 0)`;
        }
        tickerFrame = requestAnimationFrame(step);
      };

      track.style.transform = 'translate3d(0, 0, 0)';
      tickerFrame = requestAnimationFrame(step);
    }

    function renderCandidates(row) {
      if (!Array.isArray(row.ebayCandidates) || !row.ebayCandidates.length) {
        return '<div class="candidate"><div class="candidate-title">No eBay candidates yet</div><div class="candidate-note">The weekly scan will populate the best 2 raw listings here.</div></div>';
      }
      return `<div class="candidate-list">${row.ebayCandidates.map((candidate, index) => `
        <div class="candidate">
          <div class="candidate-head">
            <div class="candidate-title">Candidate ${index + 1}</div>
            <a class="button secondary" href="${candidate.itemWebUrl}" target="_blank" rel="noopener noreferrer">Open eBay</a>
          </div>
          <div class="candidate-meta">
            <div class="metric"><div class="label">Listing total</div><div class="value">${fmtMoney(candidate.total)}</div></div>
            <div class="metric"><div class="label">Listing ROI</div><div class="value">${fmtPct(candidate.roi?.roiPercent)}</div></div>
            <div class="metric"><div class="label">Photo score</div><div class="value">${Number(candidate.photoScore?.score || 0).toFixed(0)}/100</div></div>
          </div>
          <div class="candidate-note">${candidate.title || ''}</div>
          <div class="candidate-note">${candidate.photoScore?.notes || ''}</div>
        </div>
      `).join('')}</div>`;
    }

    function mediaRingClass(row) {
      const count = Array.isArray(row.ebayCandidates) ? row.ebayCandidates.length : 0;
      if (count >= 2) return 'candidate-ring-gold';
      if (count === 1) return 'candidate-ring-silver';
      return '';
    }

    function render(rows) {
      const container = document.getElementById('results');
      if (!rows.length) {
        container.innerHTML = '<div class="empty">No matching cards.</div>';
        return;
      }
      container.innerHTML = rows.map((row, index) => `
        <article class="card">
          <div class="media ${mediaRingClass(row)}">
            <img
              src="${productImageUrl(row.productId, 'jpg')}"
              data-fallback-src="${productImageUrl(row.productId, 'png')}"
              alt="${row.code} ${row.name}"
              loading="lazy"
              onerror="if(!this.dataset.failedOnce){this.dataset.failedOnce='1';this.src=this.dataset.fallbackSrc;}else{this.replaceWith(Object.assign(document.createElement('div'),{className:'media-fallback',textContent:'Image unavailable'}));}"
            />
          </div>
          <div class="topline">
            <div class="card-head">
              <div class="rank">${index + 1}</div>
              <div>
                <div class="title">${row.code} ${row.name}</div>
                <div class="subtitle">${row.setName || 'Unknown set'}</div>
              </div>
            </div>
            <div class="roi">${fmtPct(row.roiPercent)}</div>
          </div>
          <div class="metrics">
            <div class="metric"><div class="label">Raw</div><div class="value">${fmtMoney(row.rawMarket)}</div></div>
            <div class="metric"><div class="label">PSA 10</div><div class="value">${fmtMoney(row.psa10Market)}</div></div>
            <div class="metric"><div class="label">Net exit</div><div class="value">${fmtMoney(row.netPsa10Exit)}</div></div>
            <div class="metric"><div class="label">Profit</div><div class="value">${fmtMoney(row.profit)}</div></div>
          </div>
          <div class="links">
            <a class="button" href="${row.collectrLink}" target="_blank" rel="noopener noreferrer">Open Collectr</a>
          </div>
          ${renderCandidates(row)}
        </article>
      `).join('');
    }

    function applyFilter() {
      const q = document.getElementById('search').value.trim().toLowerCase();
      if (!q) return render(allRows);
      render(allRows.filter((row) => [row.code, row.name, row.setName].some((v) => String(v || '').toLowerCase().includes(q))));
    }

    async function boot() {
      const res = await fetch('./latest.json', { cache: 'no-store' });
      if (!res.ok) throw new Error(`Failed to load latest.json (${res.status})`);
      const data = await res.json();
      allRows = Array.isArray(data.rows) ? data.rows : [];
      document.getElementById('qualifiedCount').textContent = data.qualifiedCount ?? allRows.length;
      document.getElementById('bestRoi').textContent = allRows.length ? fmtPct(allRows[0].roiPercent) : '-';
      document.getElementById('generatedAt').textContent = fmtDate(data.generatedAt);
      document.getElementById('meta').textContent = `Source: ${data.filters?.source || 'Collectr'} | Grading: $${data.filters?.gradingCost ?? 25} | Haircut: ${Math.round((data.filters?.liquidityHaircut ?? 0.12) * 100)}%`;
      document.getElementById('tickerTrack').innerHTML = buildTickerRows(allRows);
      initTicker();
      render(allRows);
      document.getElementById('search').addEventListener('input', applyFilter);
    }

    boot().catch((error) => {
      document.getElementById('meta').textContent = error.message;
      document.getElementById('results').innerHTML = '<div class="empty">No weekly scan data yet. Once the cron job runs, latest.json will appear here.</div>';
    });
  </script>
</body>
</html>
